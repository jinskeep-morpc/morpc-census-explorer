services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: morpc_census
      POSTGRES_USER: morpc
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morpc -d morpc_census"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      DATABASE_URL: postgresql://morpc:${DB_PASSWORD}@db:5432/morpc_census
      CENSUS_API_KEY: ${CENSUS_API_KEY}
      EXPORT_DIR: /app/exports
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports

volumes:
  pgdata:
